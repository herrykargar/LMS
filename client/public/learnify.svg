<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Open Book - Left Page -->
  <path d="M 105 330 L 105 195 Q 105 185 115 183 L 248 163 L 248 370 L 115 352 Q 105 350 105 340 Z" fill="white" opacity="0.95"/>

  <!-- Open Book - Right Page -->
  <path d="M 407 330 L 407 195 Q 407 185 397 183 L 264 163 L 264 370 L 397 352 Q 407 350 407 340 Z" fill="white" opacity="0.95"/>

  <!-- Book Spine -->
  <rect x="248" y="163" width="16" height="207" rx="3" fill="rgba(255,255,255,0.6)"/>

  <!-- Left page text lines -->
  <line x1="135" y1="218" x2="230" y2="210" stroke="#d97706" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="135" y1="245" x2="230" y2="239" stroke="#d97706" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="135" y1="272" x2="230" y2="268" stroke="#d97706" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="135" y1="299" x2="200" y2="296" stroke="#d97706" stroke-width="6" stroke-linecap="round" opacity="0.3"/>

  <!-- Right page text lines -->
  <line x1="282" y1="210" x2="377" y2="218" stroke="#d97706" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="282" y1="239" x2="377" y2="245" stroke="#d97706" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="282" y1="268" x2="377" y2="272" stroke="#d97706" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="282" y1="296" x2="340" y2="299" stroke="#d97706" stroke-width="6" stroke-linecap="round" opacity="0.3"/>

  <!-- Graduation Cap -->
  <!-- Cap base (diamond) -->
  <polygon points="256,95 356,135 256,165 156,135" fill="white" opacity="0.95"/>
  <!-- Cap top board shadow -->
  <polygon points="256,100 346,137 256,160 166,137" fill="white"/>

  <!-- Tassel string -->
  <line x1="335" y1="130" x2="355" y2="160" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Tassel end -->
  <circle cx="355" cy="165" r="8" fill="white"/>
</svg>
